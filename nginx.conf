server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve GIFs with long cache since they don't change
    location /animations/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else falls back to index.html (handles trailingSlash pages)
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
